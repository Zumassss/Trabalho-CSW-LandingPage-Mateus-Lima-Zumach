<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contato </title>

<style>
  :root {
  --cor-principal: #6a00ff;
  --cor-secundaria: #ffffff;
  --cor-destaque: #3d3d3d;
  --cor-card: #a5a5a5;
  --cor-texto: #000000;
  --cor-suave: #313131;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body {
  background: var(--cor-secundaria);
  color: var(--cor-texto);
  line-height: 1.6;
}

/* HEADER */
header {
  background: transparent;
  padding: 20px 40px;
  position: fixed;
  width: 100%;
  backdrop-filter: blur(10px);
}

/* MENU */
nav {
  display: flex;
  justify-content: center;
  gap: 40px;
}

nav a {
  color: var(--cor-texto);
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 1px;
  transition: 0.3s;
}

nav a:hover {
  color: var(--cor-destaque);
}

/* SEÇÕES */
section {
  padding: 120px 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

/* TEXTOS */
h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

h2 {
  font-size: 22px;
  margin-bottom: 10px;
  color: var(--cor-destaque);
}

p {
  color: var(--cor-suave);
  margin-bottom: 20px;
}

/* CARDS */
.container {
  background: var(--cor-card);
  padding: 30px;
  border-radius: 12px;
  margin-bottom: 30px;
  transition: 0.3s;
}

.container:hover {
  transform: translateY(-5px);
}

/* BOTÃO */
button {
  background: transparent;
  border: 1px solid var(--cor-destaque);
  color: var(--cor-destaque);
  padding: 10px 20px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: var(--cor-destaque);
  color: white;
}

/* FORM */
input, select, textarea {
  background: #424242;
  color: rgb(145, 145, 145);
  border: 1px solid #797979;
  padding: 10px;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border: 1px solid var(--cor-destaque);
}


</style>

</head>
<body>
    
<h1> <center> Contato </center> </h1>
<h3> <center> <i> Ficou interessado? Preencha o Formulário <br> 
e vamos transformar sua ideia em REALIDADE </i></center> </h3>
<hr>
<br>

 <form>

        <!-- Nome -->
        <label>Nome completo:</label>
        <input type="text" name="nome" placeholder="Digite seu nome" required>

        <!-- Telefone -->
        <label>Telefone:</label>
        <input type="tel" name="telefone" placeholder="(27) 99999-9999" required>

        <!-- Email -->
        <label>E-mail:</label>
        <input type="email" name="email" placeholder="seuemail@gmail.com" required>
<br>
        <!-- Tipo de pessoa -->
        <label>Tipo de cliente:</label>
        <div>
            <input type="radio" name="tipo" value="fisica"> Pessoa Física
            <input type="radio" name="tipo" value="juridica"> Pessoa Jurídica
        </div>

        <!-- Melhor horário -->
        <label>Melhor período para contato:</label>
        <select name="horario">
            <option>Manhã</option>
            <option>Tarde</option>
            <option>Noite</option>
        </select>

        <!-- Data -->
        <label>Data para contato:</label>
        <input type="date" name="data_contato">

        <!-- Hora -->
        <label>Horário específico:</label>
        <input type="time" name="hora_contato">

        <!-- Tipo de serviço -->
        <label>Tipo de serviço desejado:</label>
        <div>
            <input type="checkbox" name="servico" value="estatico"> Página Estática<br>
            <input type="checkbox" name="servico" value="dinamico"> Página Dinâmica<br>
            <input type="checkbox" name="servico" value="avancado"> Site Avançado
        </div>

        <!-- Descrição -->
        <label>Descreva o que você deseja:</label> <br>
        <textarea name="descricao" rows="5" placeholder="Explique seu projeto..."></textarea>
        <br>
        <!-- Botão -->
        <button type="submit">Enviar</button>

    </form>
    <hr>
<p> <a href="../index.html" target="_self" rel="next"> <img src="../imagem/Voltar.png" width="100px" alt="Voltar"> </a> </p>
</body>
</html>
