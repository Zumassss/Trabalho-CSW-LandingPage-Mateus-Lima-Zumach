<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>servicos</title>

<style>
  :root {
  --cor-principal: #6a00ff;
  --cor-secundaria: #ffffff;
  --cor-destaque: #000000;
  --cor-card: #1c1c1c;
  --cor-texto: #000000;
  --cor-suave: #000000;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body {
  background: var(--cor-secundaria);
  color: var(--cor-texto);
  line-height: 1.6;
}

/* HEADER */
header {
  background: transparent;
  padding: 20px 40px;
  position: fixed;
  width: 100%;
  backdrop-filter: blur(10px);
}

/* MENU */
nav {
  display: flex;
  justify-content: center;
  gap: 40px;
}

nav a {
  color: var(--cor-texto);
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 1px;
  transition: 0.3s;
}

nav a:hover {
  color: var(--cor-destaque);
}

/* SEÇÕES */
section {
  padding: 120px 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

/* TEXTOS */
h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

h2 {
  font-size: 22px;
  margin-bottom: 10px;
  color: var(--cor-destaque);
}

p {
  color: var(--cor-suave);
  margin-bottom: 20px;
}

/* CARDS */
.container {
  background: var(--cor-card);
  padding: 30px;
  border-radius: 12px;
  margin-bottom: 30px;
  transition: 0.3s;
}

.container:hover {
  transform: translateY(-5px);
}

/* BOTÃO */
button {
  background: transparent;
  border: 1px solid var(--cor-destaque);
  color: var(--cor-destaque);
  padding: 10px 20px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: var(--cor-destaque);
  color: white;
}

/* FORM */
input, select, textarea {
  background: #111;
  color: white;
  border: 1px solid #333;
  padding: 10px;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border: 1px solid var(--cor-destaque);
}

</style>

</head>
